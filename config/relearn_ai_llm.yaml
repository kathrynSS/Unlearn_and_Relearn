# 反学习配置文件 - 基于 ChatGPT 教学的版本
# 完全采用 chat_learning_loop.py 的 pipeline
# 
# 工作流程（对每个问题）：
# 1. 老师提问
# 2. 学生回答并解释
# 3. 老师判断是否正确
# 4. 如果错误：立即进行训练，然后老师解释
# 5. 重复最多 4 轮，直到回答正确

model_family: mistral-7b
model_path: null  # 遗忘后的模型路径，需要在命令行指定
from_hf_hub: false

# 可选：限制处理的样本数量（用于快速测试）
# num_samples: 10  # 不设置则处理所有数据

# 每轮训练的参数（与 chat_learning_loop.py 的 simple_relearn 参数对应）
relearn_lr: 3e-5  # 每轮训练的学习率（默认 3e-5）
relearn_epochs: 2  # 每轮训练的 epoch 数（默认 2）

# 训练模式选择
# full_finetune: true 表示全量微调（所有参数可训练）
# full_finetune: false 且 LoRA.r > 0 表示使用 LoRA
# full_finetune: false 且 LoRA.r = 0 也会触发全量微调
full_finetune: true

LoRA:
  r: 8
  alpha: 32
  dropout: 0.05

# 学习率建议：
# - 全量微调: 2e-5 ~ 5e-5 (较小，避免灾难性遗忘)
# - LoRA: 1e-4 ~ 5e-4 (可以更大)
lr: 1e-5
split: forget_10  # 要重新学习的数据 split
data_path: data_construct/data/data_ai_progressive  # 数据路径
batch_size: 16
gradient_accumulation_steps: 1
num_epochs: 10  # 反学习的 epoch 数
overwrite_dir: false
seed: 42
weight_decay: 0.01
save_dir_root: results
save_dir: ${save_dir_root}/relearn/${model_path}/${split}_${num_epochs}epochs

